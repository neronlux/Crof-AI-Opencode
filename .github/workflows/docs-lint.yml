name: Docs Lint

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  lint:
    name: Lint Docs And Secrets
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Vale
        run: |
          curl -fsSL -o vale.tar.gz "https://github.com/errata-ai/vale/releases/download/v3.14.1/vale_3.14.1_Linux_64-bit.tar.gz"
          tar -xzf vale.tar.gz
          sudo mv vale /usr/local/bin/vale
          vale --version

      - name: Install dependencies
        run: npm install

      - name: Run lint suite
        run: npm run lint
